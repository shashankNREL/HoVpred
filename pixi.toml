[workspace]
name = "hovpred"
version = "0.1.0"
description = "HoVpred macOS inference environment (CPU, arm64)"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = "3.10.*"
# numpy <2 required: TF 2.13/2.14 and DGL 1.0.x both require numpy 1.x
numpy = ">=1.21,<2"
pandas = ">=1.3"
scikit-learn = ">=1.0"
rdkit = ">=2022"
# pip is needed so the tasks below can install TF and DGL into this environment
pip = "*"

# TF and DGL are NOT in pixi [pypi-dependencies] because pixi's uv solver cannot
# resolve tensorflow for osx-arm64 when combined with conda packages, and DGL 1.0.x
# (the last version with TF backend) is only available via the DGL wheel index.
# Use the tasks below to install them once after `pixi install`.

[tasks]
# Step 1: install TensorFlow (unified arm64 wheel, replaces old tensorflow-macos)
install-tf  = "pip install 'tensorflow>=2.13,<2.16'"
# Step 2: install DGL 1.0.2 — last release with TF backend; arm64 CPU wheel from DGL index
install-dgl = "pip install 'dgl==1.0.2' -f https://data.dgl.ai/wheels/repo.html"
# Convenience: run both installs
setup       = { depends-on = ["install-tf", "install-dgl"] }
# Run the smoke test (tasks 2–4 of the implementation plan)
smoke-test  = "python test_macos_load.py"
